apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: brokerone-dispatcher-job-local
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/brendoncardoso/brokerone-dispatcher-job
    targetRevision: main
    path: brokerone-dispatcher-job
  destination:
    server: https://kubernetes.default.svc
    namespace: local
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true