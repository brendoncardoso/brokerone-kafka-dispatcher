apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fechamento-dispatcher-job-creator
  namespace: local
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fechamento-dispatcher-job-creator-binding
  namespace: local
subjects:
  - kind: ServiceAccount
    name: fechamento-dispatcher-sa
    namespace: local
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fechamento-dispatcher-job-creator